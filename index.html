<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化交易助手 - v1.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 12px; max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; padding: 16px 0; }
        .header h1 { font-size: 18px; margin-bottom: 4px; }
        .header p { font-size: 11px; color: #999; }
        
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 12px; color: #999; margin-bottom: 10px; }
        
        .market-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .market-item { text-align: center; padding: 10px 4px; background: #f8f8f8; border-radius: 8px; }
        .market-item .value { font-size: 16px; font-weight: bold; }
        .market-item .label { font-size: 10px; color: #888; margin-top: 2px; }
        
        .status-bar { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; margin-top: 12px; }
        .status-bull { background: #e6f7e6; }
        .status-bear { background: #fff2e6; }
        .status-neutral { background: #e6f0ff; }
        .status-text { font-size: 14px; font-weight: bold; }
        .status-desc { font-size: 12px; color: #666; margin-left: 8px; }
        
        .stock-item { background: #f8f8f8; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .stock-name { font-weight: bold; font-size: 15px; }
        .stock-code { color: #999; font-size: 11px; margin-left: 6px; }
        .stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .stock-tag { font-size: 11px; padding: 4px 8px; border-radius: 4px; background: white; }
        .stock-tag.green { color: #07c160; }
        .stock-tag.red { color: #ff4d4f; }
        .stock-tag.blue { color: #1989fa; }
        
        .tab-bar { display: flex; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tab { flex: 1; padding: 12px 8px; text-align: center; cursor: pointer; border: none; background: none; font-size: 13px; font-weight: 500; }
        .tab.active { background: #1989fa; color: white; }
        
        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .form-input, .form-select { width: 100%; padding: 10px 12px; border: 1px solid #e6e6e6; border-radius: 8px; font-size: 14px; background: #fafafa; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn-primary { background: #1989fa; color: white; }
        .btn-success { background: #07c160; color: white; }
        .btn-secondary { background: #e6e6e6; color: #666; }
        
        .log-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .log-item:last-child { border: none; }
        .log-action { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .log-action.buy { background: #e6f7e6; color: #07c160; }
        .log-action.sell { background: #fff2f2; color: #ff4d4f; }
        .log-action.add { background: #e6f0ff; color: #1989fa; }
        .log-action.reduce { background: #fff2e6; color: #ff6b00; }
        .log-time { font-size: 10px; color: #999; margin-top: 2px; }
        
        .hidden { display: none; }
        .timestamp { font-size: 10px; color: #bbb; text-align: center; margin-top: 8px; }
        
        .empty { text-align: center; padding: 30px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 量化交易助手</h1>
        <p>v1.1 生产版 | 数据每日自动更新</p>
    </div>

    <!-- 市场状态 -->
    <div class="card">
        <div class="card-title">市场状态</div>
        <div class="market-grid">
            <div class="market-item">
                <div class="value" id="hs300Close">--</div>
                <div class="label">沪深300</div>
            </div>
            <div class="market-item">
                <div class="value" id="breadth">--%</div>
                <div class="label">市场宽度</div>
            </div>
            <div class="market-item">
                <div class="value" id="hs300MA20">--</div>
                <div class="label">vs MA20</div>
            </div>
        </div>
        <div class="status-bar" id="statusBar">
            <span class="status-text" id="statusText">加载中...</span>
            <span class="status-desc" id="statusDesc"></span>
        </div>
    </div>

    <!-- 操作建议 -->
    <div class="card">
        <div class="card-title">📌 今日操作建议</div>
        <div id="advicePanel">
            <div class="empty">正在加载建议...</div>
        </div>
    </div>

    <!-- 标签页 -->
    <div class="tab-bar">
        <button class="tab active" onclick="showTab('stocks')">推荐股票</button>
        <button class="tab" onclick="showTab('feedback')">持仓反馈</button>
        <button class="tab" onclick="showTab('logs')">我的记录</button>
    </div>

    <!-- 推荐股票 -->
    <div id="tab-stocks" class="card">
        <div class="card-title">🔥 今日推荐</div>
        <div id="stockList">
            <div class="empty">暂无推荐</div>
        </div>
    </div>

    <!-- 持仓反馈 -->
    <div id="tab-feedback" class="card hidden">
        <div class="card-title">📝 持仓反馈</div>
        <p style="font-size: 12px; color: #999; margin-bottom: 12px;">告诉我您的持仓情况，我会记录并分析</p>
        
        <div class="form-group">
            <label class="form-label">股票代码</label>
            <input type="text" class="form-input" id="feedCode" placeholder="如: 002824">
        </div>
        
        <div class="form-group">
            <label class="form-label">股票名称</label>
            <input type="text" class="form-input" id="feedName" placeholder="如: 和胜股份">
        </div>
        
        <div class="form-group">
            <label class="form-label">操作类型</label>
            <select class="form-select" id="feedAction">
                <option value="buy">买入 (建仓)</option>
                <option value="add">加仓</option>
                <option value="sell">卖出 (清仓)</option>
                <option value="reduce">减仓</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">持仓数量 (股)</label>
            <input type="number" class="form-input" id="feedShares" placeholder="如: 1000">
        </div>
        
        <div class="form-group">
            <label class="form-label">成交价格</label>
            <input type="number" class="form-input" id="feedPrice" placeholder="如: 25.34" step="0.01">
        </div>
        
        <div class="form-group">
            <label class="form-label">成交日期</label>
            <input type="date" class="form-input" id="feedDate">
        </div>
        
        <button class="btn btn-success" onclick="submitFeedback()">提交反馈</button>
    </div>

    <!-- 操作记录 -->
    <div id="tab-logs" class="card hidden">
        <div class="card-title">📜 操作记录</div>
        <div id="logList">
            <div class="empty">暂无记录</div>
        </div>
    </div>

    <div class="timestamp">v1.1 生产版 | 数据基于每日信号</div>

    <script>
        // 数据存储
        const STOCKS_KEY = 'quant_feedback_logs';
        const HOLDINGS_KEY = 'quant_holdings';

        // 默认推荐股票（基于v1.1策略）
        const DEFAULT_STOCKS = [
            { code: '002824', name: '和胜股份', buy: 25.34, stop: 23.31, target: 30.40 },
            { code: '002361', name: '神剑股份', buy: 20.76, stop: 19.10, target: 24.91 },
            { code: '002418', name: '康盛股份', buy: 5.70, stop: 5.24, target: 6.84 },
            { code: '002536', name: '飞龙股份', buy: 36.24, stop: 33.34, target: 43.49 }
        ];

        // 默认市场状态
        const DEFAULT_MARKET = {
            hs300_close: 4807.31,
            hs300_change: -0.06,
            breadth: 49.4,
            above_ma20: true
        };

        // 初始化
        function init() {
            document.getElementById('feedDate').value = new Date().toISOString().split('T')[0];
            loadData();
            renderStocks();
            renderLogs();
        }

        function loadData() {
            // 尝试从localStorage读取数据
            const savedMarket = localStorage.getItem('quant_market');
            const market = savedMarket ? JSON.parse(savedMarket) : DEFAULT_MARKET;
            updateMarketUI(market);
            updateAdvice(market);
        }

        function updateMarketUI(market) {
            document.getElementById('hs300Close').textContent = market.hs300_close ? market.hs300_close.toFixed(0) : '--';
            document.getElementById('breadth').textContent = market.breadth ? market.breadth + '%' : '--%';
            document.getElementById('hs300MA20').textContent = market.above_ma20 ? '↑上方' : '↓下方';

            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const statusDesc = document.getElementById('statusDesc');

            if (market.breadth >= 60 && market.above_ma20) {
                statusBar.className = 'status-bar status-bull';
                statusText.textContent = '🟢 满仓持仓';
                statusDesc.textContent = '建议60%仓位';
            } else if (market.breadth >= 50 || market.above_ma20) {
                statusBar.className = 'status-bar status-neutral';
                statusText.textContent = '🟡 轻仓观望';
                statusDesc.textContent = '建议30%仓位';
            } else {
                statusBar.className = 'status-bar status-bear';
                statusText.textContent = '🔴 股转基/债';
                statusDesc.textContent = '建议空仓观望';
            }
        }

        function updateAdvice(market) {
            const panel = document.getElementById('advicePanel');
            let html = '';

            if (market.breadth >= 60 && market.above_ma20) {
                html = `
                    <p style="font-size: 13px; color: #666;">✓ 沪深300在MA20上方</p>
                    <p style="font-size: 13px; color: #666;">✓ 市场宽度${market.breadth}% ≥ 60%</p>
                    <p style="margin-top: 10px; font-size: 13px;">→ <strong>建议满仓持仓</strong>，保持60%股票仓位</p>
                `;
            } else if (market.breadth >= 50 || market.above_ma20) {
                html = `
                    <p style="font-size: 13px; color: #666;">⚠ 市场宽度${market.breadth}% &lt; 60%</p>
                    <p style="font-size: 13px; color: #666;">→ ${market.above_ma20 ? '沪深300在MA20上方' : '沪深300在MA20下方'}</p>
                    <p style="margin-top: 10px; font-size: 13px;">→ <strong>建议轻仓观望</strong>，保持30%仓位</p>
                `;
            } else {
                html = `
                    <p style="font-size: 13px; color: #666;">✗ 市场宽度${market.breadth}% &lt; 50%</p>
                    <p style="font-size: 13px; color: #666;">✗ 沪深300 &lt; MA20</p>
                    <p style="margin-top: 10px; font-size: 13px;">→ <strong>建议股转基/债</strong>，，资金转入货币基金或债券</p>
                `;
            }

            panel.innerHTML = html;
        }

        function renderStocks() {
            const list = document.getElementById('stockList');
            let html = '';

            DEFAULT_STOCKS.forEach(s => {
                const gain = ((s.target - s.buy) / s.buy * 100).toFixed(1);
                const loss = ((s.buy - s.stop) / s.buy * 100).toFixed(1);
                
                html += `
                    <div class="stock-item">
                        <div class="stock-header">
                            <div>
                                <span class="stock-name">${s.name}</span>
                                <span class="stock-code">${s.code}</span>
                            </div>
                            <button class="btn-secondary" style="padding: 4px 10px; font-size: 11px;" onclick="fillFeedback('${s.code}', '${s.name}', 'buy')">已买入</button>
                        </div>
                        <div class="stock-grid">
                            <span class="stock-tag green">买 ¥${s.buy}</span>
                            <span class="stock-tag red">损 ¥${s.stop}</span>
                            <span class="stock-tag blue">盈 ¥${s.target}</span>
                            <span class="stock-tag">空间 ${gain}%</span>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function fillFeedback(code, name, action) {
            document.getElementById('feedCode').value = code;
            document.getElementById('feedName').value = name;
            document.getElementById('feedAction').value = action;
            showTab('feedback');
            window.scrollTo(0, 200);
        }

        function submitFeedback() {
            const code = document.getElementById('feedCode').value.trim();
            const name = document.getElementById('feedName').value.trim();
            const action = document.getElementById('feedAction').value;
            const shares = parseInt(document.getElementById('feedShares').value) || 0;
            const price = parseFloat(document.getElementById('feedPrice').value) || 0;
            const date = document.getElementById('feedDate').value;

            if (!code) {
                alert('请输入股票代码');
                return;
            }

            if (!confirm(`确认提交?\n${action === 'buy' ? '买入' : action === 'add' ? '加仓' : action === 'sell' ? '卖出' : '减仓'} ${name} (${code})\n${shares}股 @ ¥${price}`)) {
                return;
            }

            // 保存
            const logs = JSON.parse(localStorage.getItem(STOCKS_KEY) || '[]');
            logs.unshift({
                code, name, action, shares, price, date,
                time: new Date().toISOString()
            });
            localStorage.setItem(STOCKS_KEY, JSON.stringify(logs));

            // 清空表单
            document.getElementById('feedCode').value = '';
            document.getElementById('feedName').value = '';
            document.getElementById('feedShares').value = '';
            document.getElementById('feedPrice').value = '';

            alert('✅ 记录已保存！');
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            const logs = JSON.parse(localStorage.getItem(STOCKS_KEY) || '[]');

            if (logs.length === 0) {
                list.innerHTML = '<div class="empty">暂无记录</div>';
                return;
            }

            const actionMap = { buy: '买入', add: '加仓', sell: '卖出', reduce: '减仓' };

            let html = '';
            logs.slice(0, 20).forEach(log => {
                const d = new Date(log.time);
                const timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                html += `
                    <div class="log-item">
                        <span class="log-action ${log.action}">${actionMap[log.action]}</span>
                        <strong>${log.name}</strong> (${log.code})
                        <div class="log-time">${log.date} ${timeStr} | ${log.shares}股 @ ¥${log.price}</div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', 
                    (tab === 'stocks' && i === 0) ||
                    (tab === 'feedback' && i === 1) ||
                    (tab === 'logs' && i === 2)
                );
            });

            document.getElementById('tab-stocks').classList.toggle('hidden', tab !== 'stocks');
            document.getElementById('tab-feedback').classList.toggle('hidden', tab !== 'feedback');
            document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
        }

        init();
    </script>
</body>
</html>
